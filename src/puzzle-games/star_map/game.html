<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Map - Game Module</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #win-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            width: 100%;
            padding: 40px 0;
            background: rgba(0, 255, 0, 0.15);
            backdrop-filter: blur(8px);
            border-top: 2px solid rgba(0, 255, 0, 0.5);
            border-bottom: 2px solid rgba(0, 255, 0, 0.5);
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.2);
        }

        #win-overlay h1 {
            font-size: 80px;
            color: #00ff00;
            text-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
            margin: 0;
            text-transform: uppercase;
            animation: pulse-win 2s infinite;
            letter-spacing: 5px;
        }

        @keyframes pulse-win {
            0% { transform: scale(1); text-shadow: 0 0 20px #00ff00; }
            50% { transform: scale(1.05); text-shadow: 0 0 40px #00ff00, 0 0 80px #00ff00; }
            100% { transform: scale(1); text-shadow: 0 0 20px #00ff00; }
        }

        .secret-keyword {
            margin-top: 20px;
            font-size: 24px;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            text-shadow: 0 0 10px #ffffff;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="win-overlay">
        <h1>TRIANGULATION COMPLETE</h1>
        <div class="secret-keyword">Secret keyword: GRAVITY</div>
    </div>
    <div id="game-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/UnrealBloomPass.js"></script>
    
    <script src="game-logic.js"></script>
</body>
</html>
