name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run build
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t beacon26:ci .

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: beacon26:ci
          scanners: vuln
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

  ai:
    name: AI Build and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install AI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai/requirements.txt flake8

#      - name: Run flake8
#        run: flake8 ai/app

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AI Docker image
        run: docker build -f ai/app/Dockerfile -t beacon26-ai:ci .

      - name: Scan AI Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: beacon26-ai:ci
          scanners: vuln
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
