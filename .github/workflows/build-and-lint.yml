name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eslint:
    name: Run ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # no cache: npm here, since we don't want a lockfile

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint
        # or: run: npx eslint .